# Production-oriented Docker Compose for the blog monorepo.
#
#   docker compose up --build
#
# Brings up Postgres, then the Go backend (which runs DB migrations, seeds the
# admin user, then serves the API), then the Next.js frontend.
#
# Everything uses ${VAR:-default} interpolation so it runs out-of-the-box, but
# every value is overridable via a root .env file (see .env.docker.example)
# or your shell environment. Change the secrets and the admin password before
# exposing this to any network.

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog} -d ${POSTGRES_DB:-blog}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Exposed for local inspection; safe to remove in real deployments.
      - "${DB_PORT:-5432}:5432"

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-blog}:${POSTGRES_PASSWORD:-blog}@db:5432/${POSTGRES_DB:-blog}?sslmode=disable
      # REQUIRED in production. Override these before any real deployment.
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me-32-characters-minimum}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_PATH: storage/uploads
      MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES:-5242880}
      # PUBLIC_BASE_URL is REQUIRED in production. This is the public origin of
      # the *frontend* as seen by browsers.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      # Cache-revalidation webhook to the Next.js app (reachable inside the network).
      REVALIDATE_URL: ${REVALIDATE_URL:-http://frontend:3000/api/revalidate}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-change-me}
      # CORS must be an explicit allowlist (no '*') in production.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
    volumes:
      - uploads:/app/storage/uploads
    # Migrate up -> seed admin -> serve. migrate/seed are idempotent.
    command: ["sh", "-c", "/app/migrate up && /app/seed && /app/server"]
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Server-only base URL of the Go backend (internal network name).
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
      # Public site origin (metadata, sitemap, canonical URLs).
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Public origin of the backend for media (<img> src). MUST be reachable
      # from the browser, so it is the *public* backend URL, NOT http://backend:8080.
      NEXT_PUBLIC_MEDIA_ORIGIN: ${NEXT_PUBLIC_MEDIA_ORIGIN:-http://localhost:8080}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-change-me}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
  uploads:
