name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Build · Lint · Migrate · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blog
          POSTGRES_DB: blog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DATABASE_URL is consumed by cmd/migrate (config.Load); TEST_DATABASE_URL
      # opts the *_integration_test.go suites in (they skip when it is unset).
      DATABASE_URL: postgres://blog:blog@localhost:5432/blog_test?sslmode=disable
      TEST_DATABASE_URL: postgres://blog:blog@localhost:5432/blog_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Apply migrations
        run: go run ./cmd/migrate up

      - name: Unit & integration tests
        run: go test ./...

      - name: Race detector tests
        run: go test -race ./...
