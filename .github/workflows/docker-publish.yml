name: Docker Publish (GHCR)

# Builds both service images from the single root Dockerfile (targets: backend,
# frontend) and pushes them to GitHub Container Registry. The Deploy workflow
# runs afterwards to pull them onto the VPS.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            target: backend
          - name: frontend
            target: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the owner login may contain capitals.
      - name: Lowercase owner
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/personal-blog-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Only the frontend target consumes these; the backend build ignores them.
          # Set them as repo Variables (Settings → Secrets and variables → Actions
          # → Variables) to your public origins, e.g.
          #   NEXT_PUBLIC_SITE_URL     = https://blog.your-domain.com
          #   NEXT_PUBLIC_MEDIA_ORIGIN = https://api.your-domain.com  (or the Supabase URL)
          #   BACKEND_URL              = http://backend:8080
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_MEDIA_ORIGIN=${{ vars.NEXT_PUBLIC_MEDIA_ORIGIN }}
            BACKEND_URL=${{ vars.BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
