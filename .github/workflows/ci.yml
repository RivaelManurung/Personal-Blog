name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blog
          POSTGRES_DB: blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blog -d blog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Point the app and its tests at the Postgres service container.
      DATABASE_URL: postgres://blog:blog@localhost:5432/blog?sslmode=disable
      TEST_DATABASE_URL: postgres://blog:blog@localhost:5432/blog?sslmode=disable
      # Dev/CI defaults — never real secrets. Override in prod via env/secret store.
      APP_ENV: development
      JWT_SECRET: ci-test-jwt-secret-not-for-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt (fail on unformatted files)
        run: gofmt -l . | tee /dev/stderr | (! read)

      - name: Run migrations
        run: go run ./cmd/migrate up

      - name: Test (race + integration + coverage)
        # -p 1 serializes packages: integration tests share one TEST_DATABASE_URL
        # and TRUNCATE between tests, so concurrent packages would race.
        run: go test -race -tags=integration -cover -p 1 ./...

      - name: Build
        run: go build ./...

      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # Fetchers are resilient to a missing backend; a dummy URL is enough to build.
      BACKEND_URL: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build
        run: npm run build
